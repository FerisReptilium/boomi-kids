    <title>Boomi Kids | Onde a Sabedoria Acolhe a Infância</title>

    <!-- Fontes Premium Interacionais (Outfit para Leitos e Playfair para Títulos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
      /* Preservando sua animação original de pulsação suave */
      body { font-family: 'Outfit', sans-serif; }
      
      @keyframes pulse-gentle {
        0% { transform: scale(1); box-shadow: 0 10px 25px rgba(37,211,102,0.4); }
        50% { transform: scale(1.05); box-shadow: 0 15px 35px rgba(37,211,102,0.6); }
        100% { transform: scale(1); box-shadow: 0 10px 25px rgba(37,211,102,0.4); }
      }
      .animate-pulse-gentle { animation: pulse-gentle 3s infinite ease-in-out; }

      html { scroll-behavior: smooth; }
    </style>
  </head>

    <div id="root"></div>

  </body>
